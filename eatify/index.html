<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eatify - Tu Asistente Nutricional Personalizado</title>
    
    <!-- Habilitar soporte para Material Symbols Outlined e Iconografía -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- Librería externa oficial recomendada para gráficos (Chart.js via CDN seguro) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Enlace a la estructura modular de estilos compilados -->
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-background text-on-surface font-sans h-full flex flex-col selection:bg-primary-container selection:text-on-primary-container">

    <!-- Top App Bar (Barra Superior de Navegación principal) -->
    <header class="w-full sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-outline-variant shadow-sm flex justify-between items-center px-4 py-3 md:px-8">
        <!-- Logotipo de la Marca -->
        <div class="flex items-center gap-2 cursor-pointer" onclick="switchView('inicio')" aria-label="Volver al inicio de Eatify">
            <span class="material-symbols-outlined text-primary text-3xl font-bold" style="font-variation-settings: 'FILL' 1;">restaurant</span>
            <span class="font-display font-extrabold text-2xl tracking-tight text-primary">Eatify</span>
        </div>

        <div class="flex items-center gap-3">
            <!-- Botón de Simulación de Notificaciones -->
            <button id="sim-trigger" class="flex items-center gap-1.5 bg-secondary/10 hover:bg-secondary/20 text-secondary text-xs font-black px-4 py-2.5 rounded-full transition-all active:scale-95 border border-secondary/20" title="Prueba el sistema simulado de alertas e intervalos nutricionales">
                <span class="material-symbols-outlined text-sm font-bold">notifications_active</span>
                <span>Probar Alerta</span>
            </button>

            <!-- Ícono/Avatar Perfil de Usuario -->
            <div id="user-avatar-initial" class="w-9 h-9 rounded-full bg-emerald-100 text-primary flex items-center justify-center font-bold text-sm border-2 border-primary/20 shadow-inner cursor-pointer" onclick="switchView('menu')" title="Ir al Perfil" aria-label="Perfil del usuario">
                J
            </div>
        </div>
    </header>

    <!-- Contenedor de la Vista Activa (Renderizado dinámico de SPA por js/app.js) -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-6 pb-28 md:pb-12" id="app-container">
        <!-- Renderizado dinámico aquí -->
    </main>

    <!-- Navigation Bar Inferior (Diseño Mobile-First optimizado para fácil alcance táctil) -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-t border-outline-variant shadow-lg py-2">
        <div class="max-w-md mx-auto flex justify-around items-center px-2">
            <!-- Pestaña 1: Inicio / Dashboard -->
            <a href="#" class="nav-link flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all p-1 px-3 rounded-xl scale-95 active:scale-90" data-view="inicio" aria-label="Inicio">
                <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
                <span class="text-[10px] font-bold mt-0.5">Inicio</span>
            </a>

            <!-- Pestaña 2: Notificaciones / Horarios -->
            <a href="#" class="nav-link flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all p-1 px-3 rounded-xl scale-95 active:scale-90" data-view="notif" aria-label="Horarios de comidas">
                <span class="material-symbols-outlined text-2xl">alarm</span>
                <span class="text-[10px] font-bold mt-0.5">Horarios</span>
            </a>

            <!-- Pestaña 3: Registrar Ingestas -->
            <a href="#" class="nav-link flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all p-1 px-3 rounded-xl scale-95 active:scale-90" data-view="registrar" aria-label="Registrar alimento">
                <span class="material-symbols-outlined text-2xl">add_circle</span>
                <span class="text-[10px] font-bold mt-0.5">Registrar</span>
            </a>

            <!-- Pestaña 4: Estadísticas de Progreso -->
            <a href="#" class="nav-link flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all p-1 px-3 rounded-xl scale-95 active:scale-90" data-view="calendario" aria-label="Progreso y estadísticas">
                <span class="material-symbols-outlined text-2xl">bar_chart</span>
                <span class="text-[10px] font-bold mt-0.5">Progreso</span>
            </a>

            <!-- Pestaña 5: Perfil / Perfil / Ajustes -->
            <a href="#" class="nav-link flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all p-1 px-3 rounded-xl scale-95 active:scale-90" data-view="menu" aria-label="Ajustes de Perfil">
                <span class="material-symbols-outlined text-2xl">manage_accounts</span>
                <span class="text-[10px] font-bold mt-0.5">Perfil</span>
            </a>
        </div>
    </nav>

    <!-- Cargar archivo principal de Javascript con el módulo correspondiente -->
    <script type="module" src="/js/app.js"></script>

</body>
</html>
